<!-- templates/admin/editar_usuario.html -->
{% extends "admin/base_admin.html" %}

{% block title %}Editar Usuario{% endblock %}

{% block page_title %}Editar Usuario: {{ usuario.username }}{% endblock %}

{% block content %}
<div class="form-container">
    <form method="POST" class="admin-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">
        
        <div class="form-grid">
            <div class="form-group">
                <label for="username">Nombre de usuario *</label>
                <input type="text" id="username" name="username" value="{{ usuario.username }}" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" value="{{ usuario.email }}" required>
            </div>

            <div class="form-group">
                <label for="password">Nueva contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Dejar en blanco para no cambiar">
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
                <small class="form-text">Mínimo 6 caracteres si se desea cambiar</small>
            </div>

            <div class="form-check">
                <input type="checkbox" id="es_admin" name="es_admin" {% if usuario.es_admin %}checked{% endif %}>
                <label for="es_admin">Es administrador</label>
            </div>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('lista_usuarios') }}" class="btn-secondary">
                <i class="fas fa-times"></i> Cancelar
            </a>
            <button type="submit" class="btn-primary">
                <i class="fas fa-save"></i> Actualizar Usuario
            </button>
        </div>
    </form>
</div>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    }
}
</script>
{% endblock %}
